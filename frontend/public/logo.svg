<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" height="40" width="220">
  <!-- Diamond / house mark -->
  <polygon points="20,24 36,4 52,24 36,44" fill="#1A56DB"/>
  <!-- Roof triangle (white cutout) -->
  <polygon points="28,24 36,13 44,24" fill="white"/>
  <!-- House body (white) -->
  <rect x="29" y="24" width="14" height="10" rx="1" fill="white"/>
  <!-- Door / window (blue) -->
  <rect x="33" y="26" width="6" height="8" rx="1" fill="#1A56DB"/>
  <!-- Wordmark -->
  <text x="62" y="22" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="700" font-size="16" fill="#0B1F3A" letter-spacing="0.5">HASKER &amp; CO.</text>
  <text x="63" y="37" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="9" fill="#1A56DB" letter-spacing="3">REALTY GROUP</text>
</svg>
